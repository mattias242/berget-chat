# fly.toml app configuration file for berget-chat-mattias
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'berget-chat-mattias'
primary_region = 'arn'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
