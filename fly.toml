# fly.toml app configuration file generated for berget-chat-patrik on 2026-05-03T12:11:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'berget-chat-patrik'
primary_region = 'arn'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
